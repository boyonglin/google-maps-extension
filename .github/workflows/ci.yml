name: CI
permissions:
  contents: read

on:
  push:
    branches: ["**"]
    paths-ignore: ["**.md"]
  pull_request:
    paths-ignore: ["**.md"]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    # Avoid duplicate runs when a PR branch also triggers the push event
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          npx jest --ci --coverage | tee jest-console.txt

      - name: Post console to Checks Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Jest Console Output"
            echo
            echo '```text'
            if [ -f jest-console.txt ]; then
              cat jest-console.txt
            else
              echo "No captured output (tests may have failed before logging)."
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
